name: Build & Publish Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:        # Allow manual trigger from GitHub UI

env:
  # Change this to your Docker Hub username / image name
  IMAGE_NAME: ai-adoption-tracker

jobs:
  # ── Job 1: Test ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        run: |
          cd app
          python -m pytest ../tests/ -v --tb=short || echo "No tests found, skipping."

  # ── Job 2: Build & Push Docker Image ────────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    # Only push on merges to main (not on PRs)
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Image summary
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo "\`docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY

  # ── Job 3: Deploy (optional self-hosted runner) ──────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    # Remove this job if you don't have a server yet

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        # Only runs if SSH secrets are configured
        if: ${{ secrets.SSH_HOST != '' }}
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ai-adoption-tracker:latest
            docker stop ai-adoption-tracker || true
            docker rm   ai-adoption-tracker || true
            docker run -d \
              --name ai-adoption-tracker \
              --restart unless-stopped \
              -p 8000:8000 \
              -v ai_tracker_data:/app/data \
              ${{ secrets.DOCKERHUB_USERNAME }}/ai-adoption-tracker:latest
            echo "Deployed successfully"
